# Bandit configuration file for bandit version 1.7.9

# Specify the output format (e.g., json, yaml, csv, txt)
format: txt

# Exclude specific directories from the analysis (e.g., migrations, settings)
exclude_dirs:
  - migrations
  - tests
  - __pycache__
  - static
  - templates
  - .vscode-server
  - .vscode

# Include files with specific extensions
include:
  - "*.py"

# Skip specific tests (e.g., B101 is assert statement, which may be used in tests)
skips:
  - B101 # Use of assert
  - B301 # Pickle or cPickle use
  - B308 # Use of markupsafe
  - B302 # marshal use
  - B404 # import subprocess
  - B703 # import random

# Select tests explicitly (if you want to limit to certain tests)
# select:
#   - B1XX  # Bandit will only run B1XX tests

# Test configuration for Django (Django-specific configurations)
test_config:
  B104: # Test for use of insecure functions (e.g., `exec`)
    severity: HIGH
    confidence: HIGH
  B110: # Test for SQL injection via string building
    severity: HIGH
    confidence: HIGH

# Set the severity and confidence level threshold for issues to be reported
severity: LOW
confidence: LOW

# List of directories to scan
targets:
  - .

# Show the full context for each issue (True/False)
show_context: True

# Use the quiet mode (less output)
quiet: False

# Exclude third-party packages (installed in virtual environment)
exclude: [".venv", "env"]
# Add Django-specific security checks if needed (customize further if required)
# Add any additional custom Django-specific settings below
