[mypy]
# Specify the plugin for Django support
plugins = mypy_django_plugin.main

# General mypy options
python_version = 3.11
ignore_missing_imports = True
follow_imports = silent
check_untyped_defs = True

# Enable strict mode for comprehensive type checking
strict = True

# Show error codes for better context on errors
show_error_codes = True

# Enable incremental mode to speed up type checks
incremental = True

# Enable strict optional checking
strict_optional = True

# Warn about unused 'type: ignore' comments
warn_unused_ignores = True

# Warn about unreachable code
warn_unreachable = True

# Warn about unused configurations
warn_unused_configs = True

# Additional checks to consider for Django projects
warn_return_any = True               
disallow_untyped_defs = True
disallow_any_generics = True
disallow_incomplete_defs = True

# Enable specific settings for Django's dynamic behavior
allow_untyped_globals = True

# Additional recommended options
warn_redundant_casts = True
warn_no_return = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
disallow_subclassing_any = True

# Django plugin settings
[mypy.plugins.django-stubs]
django_settings_module = "portal.settings.dev"

[mypy-*.migrations.*]
# Ignore type checking for Django migrations
ignore_errors = True