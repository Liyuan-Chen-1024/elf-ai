services:
  api:
    build:
      target: production
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - media-data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DJANGO_SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - DEBUG=0
    depends_on:
      - db
      - redis

  web:
    build:
      target: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - media-data:/app/media
    environment:
      - VITE_API_URL=${API_URL}
      - NODE_ENV=production
    depends_on:
      - api

  db:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.0
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
  media-data:
