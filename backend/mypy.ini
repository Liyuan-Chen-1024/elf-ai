[mypy]
# Global options with full strictness
python_version = 3.11
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
ignore_missing_imports = True
disallow_any_unimported = True
disallow_subclassing_any = True
disallow_any_generics = True

# Super strict mode for new code
[mypy-apps.core.models]
strict = True
disallow_any_unimported = True
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False
disallow_any_generics = False
disallow_subclassing_any = True
warn_return_any = True

# Fully typed modules with strict settings
[apps.core.models]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True
no_implicit_optional = True
strict_optional = True

[apps.chat.models]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True
no_implicit_optional = True
strict_optional = True

[apps.core.utils]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True
no_implicit_optional = True
strict_optional = True

# Per-module options
[apps.*.tests.*]
# Tests can be a bit less strict
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_any_unimported = False
disallow_any_generics = False

[config.settings.*]
# Settings files often use dynamic attributes
disable_error_code = var-annotated,no-redef
disallow_any_generics = False
disallow_any_unimported = False

# Ignore Django model field annotations 
# Will still require explicit annotations on methods
[apps.*.models]
disable_error_code = var-annotated

# Ignore admin attributes for decorators
[apps.*.admin]
disable_error_code = attr-defined
disallow_untyped_decorators = False

# Allow missing returns in management commands
[apps.*.management.commands.*]
disable_error_code = return

# Disable checks that are too strict for now
[apps.*]
disable_error_code = attr-defined,var-annotated,assignment,arg-type,no-any-return,return-value,union-attr,no-redef,valid-type,name-defined,unreachable,redundant-cast,unused-ignore

# Configuration for Django 
[mypy.plugins.django-stubs]
django_settings_module = "config.settings.development"

# Install these stubs with: pip install types-redis types-requests types-python-dateutil
[mypy_django_plugin]
ignore_missing_model_attributes = True 