services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/api:/app
      - media-data:/app/media
      - ./.vscode-server:/root/.vscode-server
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DJANGO_ENV=development
      - DATABASE_URL=mysql://elfai:elfai@db:3306/elfai
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=dev-secret-key
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - DEBUG=1
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./apps/client/web
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "3000:3000"
    volumes:
      - ./apps/client/web:/app
      - /app/node_modules
      - ./.vscode-server:/root/.vscode-server
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - NODE_ENV=development
    depends_on:
      - api

  db:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=elfai
      - MYSQL_USER=elfai
      - MYSQL_PASSWORD=elfai
      - MYSQL_ROOT_PASSWORD=root
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  media-data:


networks:
  elfai-network:
    driver: bridge
