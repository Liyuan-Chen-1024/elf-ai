services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${API_PORT}:${API_PORT}"
    command: python manage.py runserver 0.0.0.0:${API_PORT}
    volumes:
      - ./backend:/app
      - media-data:/app/media
      - ./.vscode-server:/root/.vscode-server
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=mysql://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
      - REDIS_URL=redis://redis:${REDIS_INTERNAL_PORT}/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}

    extra_hosts:
      - "host.docker.internal:host-gateway"


  db:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: >
        mysqladmin ping -h localhost &&
        mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e 'SELECT 1 FROM ${DB_NAME}.information_schema.tables LIMIT 1;' &&
        mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e 'SHOW GRANTS;' | grep 'ALL PRIVILEGES'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  media-data:

networks:
  elfai-network:
    driver: bridge
