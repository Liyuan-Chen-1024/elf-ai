services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${API_PORT}:${API_PORT}"
    command: python manage.py runserver 0.0.0.0:${API_PORT}
    volumes:
      - ./backend:/app
      - media-data:/app/media
      - ./.vscode-server:/root/.vscode-server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - DRF_PAGE_SIZE=${DRF_PAGE_SIZE}
      - DRF_THROTTLE_ANON_RATE=${DRF_THROTTLE_ANON_RATE}
      - DRF_THROTTLE_USER_RATE=${DRF_THROTTLE_USER_RATE}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - media-data:/app/media
      - ./.vscode-server:/root/.vscode-server
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=${APP_ENVIRONMENT}
      - PORT=${FRONTEND_PORT}
      - VITE_API_URL=http://localhost:${API_PORT}/api/v1
      - VITE_WEBSOCKET_URL=ws://localhost:${API_PORT}/ws/
    depends_on:
      - backend

  db:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${DB_PORT}:3306"
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: >
        mysqladmin ping -h localhost &&
        mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e 'SELECT 1 FROM ${DB_NAME}.information_schema.tables LIMIT 1;' &&
        mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e 'SHOW GRANTS;' | grep 'ALL PRIVILEGES'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  media-data:
  frontend-node-modules:

networks:
  elfai-network:
    driver: bridge
