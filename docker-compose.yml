version: '3.12-rc-buster'

services:
  jarvis:
    command: >
      sh -c "cron && 
             python3 manage.py collectstatic --noinput &&
             python3 manage.py migrate
             tail -f /dev/null" 
    build:
      context: .
      args:
        - ENABLE_CRON=1
    ports:
      - 8000:8000
      - 9922:22
    volumes:
      - ./:/app
      - ./.vscode-server:/root/.vscode-server
      - ~/docker_volumes/deployservice/:/deployservice
    links: 
      - tx
      - redis
  redis:
    command: bash -c "redis-server --save 10 1 --requirepass 8hd8293hd92"
    image: redis
    ports:
      - 6379:6379
    volumes:
      - ~/docker_volumes/redis-data:/data
  tx:
    cap_add:
      - NET_ADMIN
    volumes:
      - '$HOME/downloads:/data'
    environment:
      - OPENVPN_PROVIDER=NordVPN
      - OPENVPN_CONFIG=ro
      - NORDVPN_COUNTRY=RO
      - NORDVPN_PROTOCOL=udp
      - NORDVPN_CATEGORY=P2P
      - OPENVPN_USERNAME=ihibv6TpxEEcA2mmQVJEYtf5
      - OPENVPN_PASSWORD=jBrRQMXJvvhPurt12WyExL9K
      - LOCAL_NETWORK=192.168.0.0/16
    logging:
      driver: json-file
      options:
        max-size: 30m
    ports:
      - '9091:9091'
      - '9117:9117'
    image: haugene/transmission-openvpn