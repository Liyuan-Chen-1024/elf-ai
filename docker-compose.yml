services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${API_PORT}:${API_PORT}"
    entrypoint: ["/docker-entrypoint.sh"]
    command: python manage.py runserver 0.0.0.0:${API_PORT}
    volumes:
      - ./backend:/app
      - media-data:/app/media
      - ./.vscode-server:/root/.vscode-server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - DRF_PAGE_SIZE=${DRF_PAGE_SIZE}
      - DRF_THROTTLE_ANON_RATE=${DRF_THROTTLE_ANON_RATE}
      - DRF_THROTTLE_USER_RATE=${DRF_THROTTLE_USER_RATE}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    command: npm run dev -- --debug
    volumes:
      - ./frontend:/app
      - media-data:/app/media
      - ./.vscode-server:/root/.vscode-server
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=${APP_ENVIRONMENT}
      - PORT=${FRONTEND_PORT}
      - VITE_API_URL=http://localhost:${API_PORT}/api/v1
      - VITE_WEBSOCKET_URL=ws://localhost:${API_PORT}/ws/
      - DEBUG=vite:*
      - VITE_DEBUG=true
      - VITE_VERBOSE=true
    depends_on:
      backend:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    command: celery -A config worker -l INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    command: celery -A config beat -l INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - celery_worker
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:admin}
      - FLOWER_URL_PREFIX=${FLOWER_URL_PREFIX:-}
      - FLOWER_PERSISTENT=True
      - FLOWER_PORT=5555
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-4}
      - LLM_API_URL=${LLM_API_URL:-https://api.openai.com/v1}
    command: celery -A config flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH:-admin:admin}

  db:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${DB_PORT}:3306"
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  media-data:
  frontend-node-modules:

networks:
  elfai-network:
    driver: bridge
