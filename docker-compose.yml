services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${API_PORT}:${API_PORT}"
    entrypoint: ["/docker-entrypoint.sh"]
    command: python -Xfrozen_modules=off -m debugpy --listen 0.0.0.0:5678 --configure-subProcess true manage.py runserver 0.0.0.0:${API_PORT}
    volumes:
      - ./backend:/app
      - ${HOME}/docker_volumes/elfai/media:/app/media
      - ./backend/.vscode-server:/root/.vscode-server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - DRF_PAGE_SIZE=${DRF_PAGE_SIZE}
      - DRF_THROTTLE_ANON_RATE=${DRF_THROTTLE_ANON_RATE}
      - DRF_THROTTLE_USER_RATE=${DRF_THROTTLE_USER_RATE}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - PYDEVD_DISABLE_FILE_VALIDATION=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
      - "9222:9222"  # Add Chrome debugging port
    entrypoint: sh -c "cd /app && npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - ./.vscode-server:/root/.vscode-server
    environment:
      - NODE_ENV=${APP_ENVIRONMENT}
      - PORT=${FRONTEND_PORT}
      - VITE_API_URL=http://localhost:${API_PORT}/api/v1
      - VITE_WEBSOCKET_URL=ws://localhost:${API_PORT}/ws/
      - DEBUG=vite:*
      - VITE_DEBUG=true
      - VITE_VERBOSE=true
      - CHROME_REMOTE_DEBUGGING_PORT=9222
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_BASIC_AUTH_USERNAME=${LLM_BASIC_AUTH_USERNAME}
      - LLM_BASIC_AUTH_PASSWORD=${LLM_BASIC_AUTH_PASSWORD}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - C_FORCE_ROOT=false
      - CELERY_SECURITY_ENABLED=true
      - PYDEVD_DISABLE_FILE_VALIDATION=1
    user: "1000:1000"
    command: python -Xfrozen_modules=off celery_run.py
    # command: celery -A config worker -l INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    user: "1000:1000"
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_TITLE=${API_TITLE}
      - API_DESCRIPTION=${API_DESCRIPTION}
      - API_VERSION=${API_VERSION}
      - LANGUAGE_CODE=${LANGUAGE_CODE}
      - TIME_ZONE=${TIME_ZONE}
      - STATIC_URL=${STATIC_URL}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_BASIC_AUTH_USERNAME=${LLM_BASIC_AUTH_USERNAME}
      - LLM_BASIC_AUTH_PASSWORD=${LLM_BASIC_AUTH_PASSWORD}
      - MEDIA_ROOT=${MEDIA_ROOT}
      - MEDIA_URL=${MEDIA_URL}
      - STATIC_ROOT=${STATIC_ROOT}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - C_FORCE_ROOT=false
      - CELERY_SECURITY_ENABLED=true
      - PYDEVD_DISABLE_FILE_VALIDATION=1
    command: celery -A config beat -l INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENVIRONMENT}
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings.${APP_ENVIRONMENT}
      - DJANGO_ENV=${APP_ENVIRONMENT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:admin}
      - FLOWER_URL_PREFIX=${FLOWER_URL_PREFIX:-}
      - FLOWER_PERSISTENT=True
      - FLOWER_PORT=5555
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-4}
      - LLM_API_URL=${LLM_API_URL:-https://api.openai.com/v1}
      - PYDEVD_DISABLE_FILE_VALIDATION=1
    command: celery -A config flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH:-admin:admin}

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - LANG=en_US.utf8
      - LC_ALL=en_US.utf8
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - ${HOME}/docker_volumes/elfai/postgres:/var/lib/postgresql/data
      - ./backend/db/backups:/backups
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c 'max_connections=1000'
      -c 'shared_buffers=256MB'
      -c 'effective_cache_size=768MB'
      -c 'work_mem=32MB'
      -c 'maintenance_work_mem=64MB'
      -c 'random_page_cost=1.1'
      -c 'temp_file_limit=10GB'
      -c 'log_min_duration_statement=200ms'
      -c 'idle_in_transaction_session_timeout=10s'
      -c 'lock_timeout=1s'
      -c 'statement_timeout=60s'
      -c 'shared_preload_libraries=pg_stat_statements'
      -c 'pg_stat_statements.max=10000'
      -c 'pg_stat_statements.track=all'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - elfai-network
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${HOME}/docker_volumes/elfai/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  elfai-network:
    driver: bridge
