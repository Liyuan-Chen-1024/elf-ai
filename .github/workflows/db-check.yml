name: Database Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/config/settings/**'
      - 'docker-compose.yml'
      - '.env.base'
      - '.env.test'

jobs:
  check-db-connection:
    name: Verify Database Connection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Create environment files
        run: |
          cp .env.base .env.test.ci
          cp .env.test .env.test
          cat .env.test.ci .env.test > .env
      
      - name: Start database
        run: docker compose up -d db
      
      - name: Wait for database
        run: sleep 10
      
      - name: Check database logs for ":memory:" errors
        run: |
          if docker compose logs db | grep -i "FATAL.*:memory:"; then
            echo "ERROR: Database is still trying to connect to :memory: database"
            echo "This could be caused by incorrect settings in backend/config/settings/test.py"
            exit 1
          else
            echo "Database connection looks good!"
          fi
      
      - name: Check database connection with Django
        run: |
          docker compose run --rm backend python -c "from django.db import connection; connection.ensure_connection(); print('Database connection successful!')" 